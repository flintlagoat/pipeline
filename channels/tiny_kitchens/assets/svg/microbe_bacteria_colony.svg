<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="#3B2A1E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <!-- Petri dish outer rim -->
  <ellipse cx="200" cy="150" rx="170" ry="125" />
  <ellipse cx="200" cy="150" rx="158" ry="114" stroke-width="1.3" />

  <!-- Bacterium 1: rod (bacillus) left -->
  <g fill="#d16937" fill-opacity="0.5">
    <path d="M70 110 q-12 0 -12 14 q0 14 12 14 l30 0 q12 0 12 -14 q0 -14 -12 -14 z" />
  </g>
  <line x1="78" y1="124" x2="98" y2="124" stroke-width="1" />

  <!-- Bacterium 2: cocci cluster (spheres) -->
  <g fill="#d16937" fill-opacity="0.45">
    <circle cx="150" cy="85" r="13" />
    <circle cx="172" cy="92" r="13" />
    <circle cx="160" cy="106" r="13" />
  </g>
  <circle cx="150" cy="85" r="4" fill="#3B2A1E" stroke="none" opacity="0.5" />
  <circle cx="172" cy="92" r="4" fill="#3B2A1E" stroke="none" opacity="0.5" />

  <!-- Bacterium 3: spiral (spirillum) center -->
  <path d="M110 200 q15 -22 30 0 q15 22 30 0 q15 -22 30 0" fill="none" stroke-width="2.4" />

  <!-- Bacterium 4: rod with flagella -->
  <g fill="#d16937" fill-opacity="0.5">
    <path d="M230 200 q-13 0 -13 15 q0 15 13 15 l34 0 q13 0 13 -15 q0 -15 -13 -15 z" />
  </g>
  <path d="M278 208 q14 -6 24 2" fill="none" stroke-width="1.2" />
  <path d="M278 215 q16 0 26 6" fill="none" stroke-width="1.2" />
  <path d="M278 222 q14 6 22 16" fill="none" stroke-width="1.2" />

  <!-- Bacterium 5: large cell with internal nucleoid -->
  <g fill="#d16937" fill-opacity="0.4">
    <ellipse cx="265" cy="105" rx="38" ry="26" />
  </g>
  <path d="M245 100 q20 -12 40 4" fill="none" stroke-width="1" opacity="0.7" />
  <circle cx="258" cy="108" r="6" fill="#3B2A1E" stroke="none" opacity="0.45" />
  <circle cx="278" cy="112" r="4" fill="#3B2A1E" stroke="none" opacity="0.45" />

  <!-- small dividing cell -->
  <g fill="#d16937" fill-opacity="0.5">
    <circle cx="120" cy="150" r="11" />
    <circle cx="138" cy="150" r="11" />
  </g>

  <!-- tiny scattered microbes -->
  <circle cx="320" cy="170" r="8" fill="#d16937" fill-opacity="0.45" />
  <circle cx="305" cy="200" r="6" fill="#d16937" fill-opacity="0.4" />
  <ellipse cx="190" cy="235" rx="16" ry="8" fill="#d16937" fill-opacity="0.45" />
  <path d="M180 235 q10 -5 20 0" stroke-width="1" opacity="0.7" />
</svg>