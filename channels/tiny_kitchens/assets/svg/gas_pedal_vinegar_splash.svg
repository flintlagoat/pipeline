  <circle cx="368" cy="100" r="6" fill="#d16937" fill-opacity="0.3" stroke="#3B2A1E" stroke-width="2"/>
  <circle cx="380" cy="135" r="4" fill="none" stroke="#3B2A1E" stroke-width="1.8"/>
  <circle cx="360" cy="200" r="5" fill="#d16937" fill-opacity="0.3" stroke="#3B2A1E" stroke-width="2"/>
  <circle cx="300" cy="80" r="3.5" fill="none" stroke="#3B2A1E" stroke-width="1.8"/>
  <circle cx="262" cy="135" r="4" fill="none" stroke="#3B2A1E" stroke-width="1.8"/>
  <path d="M330 200 Q333 212 328 220" fill="none" stroke="#3B2A1E" stroke-width="2"/>
  <circle cx="326" cy="226" r="3" fill="#3B2A1E"/>
  <!-- splash spike accents -->
  <path d="M348 118 L360 108" fill="none" stroke="#3B2A1E" stroke-width="1.5"/>
  <path d="M352 160 L366 165" fill="none" stroke="#3B2A1E" stroke-width="1.5"/>
  <!-- liquid swirl inside blob -->
  <path d="M298 140 Q315 130 330 145 Q340 156 328 165" fill="none" stroke="#3B2A1E" stroke-width="1.5"/>
