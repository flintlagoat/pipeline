  <path d="M101 170 L177 164" fill="none" stroke="#3B2A1E" stroke-width="1.5"/>
  <path d="M100 190 L174 185" fill="none" stroke="#3B2A1E" stroke-width="1.5"/>
  <path d="M101 210 L168 206" fill="none" stroke="#3B2A1E" stroke-width="1.5"/>
  <!-- Floor reference line -->
  <path d="M70 245 Q150 250 240 246" fill="none" stroke="#3B2A1E" stroke-width="2" stroke-dasharray="6 5"/>

  <!-- Motion / push arrow -->
  <path d="M205 100 Q235 120 230 150" fill="none" stroke="#3B2A1E" stroke-width="2"/>
  <polygon points="230 150 224 138 238 142" fill="#3B2A1E"/>

  <!-- Vinegar splash droplet main blob -->
  <path d="M300 110 Q330 95 350 120 Q368 142 350 168 Q335 188 308 182 Q282 176 278 148 Q276 124 300 110 Z" fill="#d16937" fill-opacity="0.3" stroke="#3B2A1E" stroke-width="2.5" stroke-linejoin="round"/>
