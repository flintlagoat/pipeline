  <path d="M165 65 Q150 55 130 58 Q115 62 110 78" fill="none" stroke="#3B2A1E" stroke-width="2"/>
  <!-- Pivot circle -->
  <circle cx="118" cy="70" r="7" fill="none" stroke="#3B2A1E" stroke-width="2"/>
  <circle cx="118" cy="70" r="2.5" fill="#3B2A1E"/>
  <!-- Pedal ribbed grip lines -->
  <path d="M110 110 L168 102" fill="none" stroke="#3B2A1E" stroke-width="1.5"/>
  <path d="M106 130 L172 122" fill="none" stroke="#3B2A1E" stroke-width="1.5"/>
