<svg viewBox="0 0 300 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Jar outer silhouette -->
  <path d="M95 120 Q90 130 88 150 Q84 200 86 280 Q87 330 95 350 Q100 362 150 363 Q200 362 205 350 Q213 330 214 280 Q216 200 212 150 Q210 130 205 120 Z" fill="#d16937" fill-opacity="0.18" stroke="#3B2A1E" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Jar neck -->
  <path d="M105 120 Q104 105 106 95 L194 95 Q196 105 195 120" fill="none" stroke="#3B2A1E" stroke-width="2.5"/>
  <!-- Jar rim -->
  <path d="M100 95 Q98 86 104 82 L196 82 Q202 86 200 95 Z" fill="#d16937" fill-opacity="0.3" stroke="#3B2A1E" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Lid on top, slightly tilted -->
  <path d="M98 82 Q96 72 110 68 L190 68 Q204 72 202 82" fill="none" stroke="#3B2A1E" stroke-width="2"/>
  <ellipse cx="150" cy="68" rx="42" ry="8" fill="#d16937" fill-opacity="0.25" stroke="#3B2A1E" stroke-width="2"/>

  <!-- Vinegar fill line -->
  <path d="M89 200 Q150 207 211 200" fill="none" stroke="#3B2A1E" stroke-width="1.3" stroke-dasharray="5 4"/>

  <!-- Garlic cloves (turning green - laba garlic) -->
  <g stroke="#3B2A1E" stroke-width="1.6">
    <path d="M108 235 q-7 8 -2 18 q5 8 14 5 q7 -3 5 -14 q-2 -10 -10 -10 z" fill="#d16937" fill-opacity="0.4"/>
    <path d="M135 255 q-8 7 -3 18 q5 9 15 6 q7 -3 5 -15 q-2 -10 -11 -10 z" fill="#d16937" fill-opacity="0.4"/>
    <path d="M165 230 q-7 8 -3 18 q5 8 14 5 q8 -3 6 -14 q-2 -10 -11 -10 z" fill="#d16937" fill-opacity="0.4"/>
    <path d="M180 270 q-8 7 -3 18 q5 9 15 6 q7 -3 4 -15 q-2 -10 -11 -10 z" fill="#d16937" fill-opacity="0.4"/>
    <path d="M118 290 q-8 7 -3 18 q5 9 15 6 q7 -3 4 -15 q-2 -10 -11 -10 z" fill="#d16937" fill-opacity="0.4"/>
    <path d="M150 305 q-8 7 -3 18 q5 9 15 6 q7 -3 4 -15 q-2 -10 -11 -10 z" fill="#d16937" fill-opacity="0.4"/>
    <path d="M183 318 q-8 7 -3 18 q5 9 15 6 q7 -3 4 -15 q-2 -10 -11 -10 z" fill="#d16937" fill-opacity="0.4"/>
  </g>

  <!-- clove detail lines -->
  <g stroke="#3B2A1E" stroke-width="1" fill="none" stroke-opacity="0.7">
    <path d="M115 237 q3 10 1 20"/>
    <path d="M143 257 q3 10 1 20"/>
    <path d="M173 232 q3 10 1 20"/>
    <path d="M125 292 q3 10 1 20"/>
    <path d="M158 307 q3 10 1 20"/>
  </g>

  <!-- shine highlight on jar -->
  <path d="M104 150 Q100 200 103 260" fill="none" stroke="#3B2A1E" stroke-width="1.2" stroke-opacity="0.5"/>
</svg>