<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer building silhouette -->
  <polyline points="40,280 40,110 200,40 360,110 360,280" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  <line x1="30" y1="280" x2="370" y2="280" stroke="#FFFFFF" stroke-width="2"/>

  <!-- Roof / facade trim line -->
  <line x1="40" y1="110" x2="360" y2="110" stroke="#FFFFFF" stroke-width="1.5"/>

  <!-- Awning -->
  <polyline points="40,130 360,130 360,165 40,165 40,130" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  <line x1="40" y1="165" x2="55" y2="180" stroke="#FFFFFF" stroke-width="1"/>
  <line x1="80" y1="165" x2="95" y2="180" stroke="#FFFFFF" stroke-width="1"/>
  <line x1="120" y1="165" x2="135" y2="180" stroke="#FFFFFF" stroke-width="1"/>
  <line x1="160" y1="165" x2="175" y2="180" stroke="#FFFFFF" stroke-width="1"/>
  <line x1="200" y1="165" x2="215" y2="180" stroke="#FFFFFF" stroke-width="1"/>
  <line x1="240" y1="165" x2="255" y2="180" stroke="#FFFFFF" stroke-width="1"/>
  <line x1="280" y1="165" x2="295" y2="180" stroke="#FFFFFF" stroke-width="1"/>
  <line x1="320" y1="165" x2="335" y2="180" stroke="#FFFFFF" stroke-width="1"/>
  <line x1="55" y1="180" x2="335" y2="180" stroke="#FFFFFF" stroke-width="1"/>

  <!-- Awning scallop edge alt -->
  <line x1="40" y1="130" x2="200" y2="115" stroke="#FFFFFF" stroke-width="0.8"/>
  <line x1="360" y1="130" x2="200" y2="115" stroke="#FFFFFF" stroke-width="0.8"/>

  <!-- Sign board -->
  <rect x="130" y="78" width="140" height="26" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
  <line x1="145" y1="91" x2="180" y2="91" stroke="#FFFFFF" stroke-width="1"/>
  <line x1="190" y1="91" x2="255" y2="91" stroke="#FFFFFF" stroke-width="1"/>
  <circle cx="200" cy="64" r="6" fill="none" stroke="#FFFFFF" stroke-width="1"/>
  <path d="M196 60 Q198 56 200 60 Q202 56 204 60" fill="none" stroke="#FFFFFF" stroke-width="0.8"/>

  <!-- Left display window -->
  <rect x="58" y="195" width="90" height="75" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
  <line x1="103" y1="195" x2="103" y2="270" stroke="#FFFFFF" stroke-width="1"/>
  <line x1="58" y1="215" x2="148" y2="215" stroke="#FFFFFF" stroke-width="1"/>

  <!-- Door (center) -->
  <rect x="165" y="195" width="70" height="85" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
  <line x1="200" y1="195" x2="200" y2="280" stroke="#FFFFFF" stroke-width="1"/>
  <rect x="172" y="205" width="22" height="30" fill="none" stroke="#FFFFFF" stroke-width="0.8"/>
  <rect x="206" y="205" width="22" height="30" fill="none" stroke="#FFFFFF" stroke-width="0.8"/>
  <circle cx="195" cy="240" r="2" fill="none" stroke="#FFFFFF" stroke-width="1"/>
  <circle cx="205" cy="240" r="2" fill="none" stroke="#FFFFFF" stroke-width="1"/>

  <!-- Right display window -->
  <rect x="252" y="195" width="90" height="75" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
  <line x1="297" y1="195" x2="297" y2="270" stroke="#FFFFFF" stroke-width="1"/>
  <line x1="252" y1="215" x2="342" y2="215" stroke="#FFFFFF" stroke-width="1"/>

  <!-- Outdoor table & chairs -->
  <circle cx="310" cy="258" r="14" fill="none" stroke="#FFFFFF" stroke-width="1"/>
  <line x1="310" y1="258" x2="310" y2="280" stroke="#FFFFFF" stroke-width="1"/>

  <!-- Steaming coffee cup detail in left window -->
  <path d="M75 250 h22 v10 a11 11 0 0 1 -22 0 z" fill="none" stroke="#FFFFFF" stroke-width="1"/>
  <path d="M97 252 a6 6 0 0 1 0 12" fill="none" stroke="#FFFFFF" stroke-width="0.8"/>
  <path d="M82 240 q3 -4 0 -8 M90 240 q3 -4 0 -8" fill="none" stroke="#FFFFFF" stroke-width="0.8"/>
</svg>