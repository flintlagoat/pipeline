<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Monitor outer silhouette -->
  <rect x="60" y="30" width="280" height="190" rx="6" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  <!-- Screen bezel -->
  <rect x="74" y="44" width="252" height="148" rx="3" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
  <!-- Screen inner display area -->
  <rect x="84" y="54" width="232" height="128" fill="none" stroke="#FFFFFF" stroke-width="1"/>

  <!-- Terminal command header line -->
  <line x1="92" y1="66" x2="180" y2="66" stroke="#FFFFFF" stroke-width="1"/>
  <line x1="92" y1="74" x2="240" y2="74" stroke="#FFFFFF" stroke-width="1"/>

  <!-- Sabre-style data rows (flight/PNR list) -->
  <line x1="92" y1="88" x2="100" y2="88" stroke="#FFFFFF" stroke-width="1"/>
  <line x1="108" y1="88" x2="160" y2="88" stroke="#FFFFFF" stroke-width="1"/>
  <line x1="168" y1="88" x2="220" y2="88" stroke="#FFFFFF" stroke-width="1"/>
  <line x1="228" y1="88" x2="300" y2="88" stroke="#FFFFFF" stroke-width="1"/>

  <line x1="92" y1="100" x2="100" y2="100" stroke="#FFFFFF" stroke-width="1"/>
  <line x1="108" y1="100" x2="155" y2="100" stroke="#FFFFFF" stroke-width="1"/>
  <line x1="163" y1="100" x2="215" y2="100" stroke="#FFFFFF" stroke-width="1"/>
  <line x1="223" y1="100" x2="295" y2="100" stroke="#FFFFFF" stroke-width="1"/>

  <line x1="92" y1="112" x2="100" y2="112" stroke="#FFFFFF" stroke-width="1"/>
  <line x1="108" y1="112" x2="150" y2="112" stroke="#FFFFFF" stroke-width="1"/>
  <line x1="158" y1="112" x2="210" y2="112" stroke="#FFFFFF" stroke-width="1"/>
  <line x1="218" y1="112" x2="305" y2="112" stroke="#FFFFFF" stroke-width="1"/>

  <line x1="92" y1="124" x2="100" y2="124" stroke="#FFFFFF" stroke-width="1"/>
  <line x1="108" y1="124" x2="165" y2="124" stroke="#FFFFFF" stroke-width="1"/>
  <line x1="173" y1="124" x2="225" y2="124" stroke="#FFFFFF" stroke-width="1"/>
  <line x1="233" y1="124" x2="300" y2="124" stroke="#FFFFFF" stroke-width="1"/>

  <line x1="92" y1="136" x2="160" y2="136" stroke="#FFFFFF" stroke-width="1"/>
  <line x1="168" y1="136" x2="240" y2="136" stroke="#FFFFFF" stroke-width="1"/>

  <!-- command prompt with cursor -->
  <polyline points="92,160 100,166 92,172" fill="none" stroke="#FFFFFF" stroke-width="1.2"/>
  <line x1="106" y1="172" x2="160" y2="172" stroke="#FFFFFF" stroke-width="1.2"/>
  <rect x="166" y="160" width="9" height="13" fill="none" stroke="#FFFFFF" stroke-width="1"/>

  <!-- Power LED -->
  <circle cx="200" cy="206" r="3" fill="none" stroke="#FFFFFF" stroke-width="1.2"/>

  <!-- Stand neck -->
  <rect x="185" y="220" width="30" height="22" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  <!-- Stand base -->
  <path d="M150 270 L250 270 L235 250 L165 250 Z" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  <line x1="158" y1="270" x2="242" y2="270" stroke="#FFFFFF" stroke-width="1"/>
</svg>