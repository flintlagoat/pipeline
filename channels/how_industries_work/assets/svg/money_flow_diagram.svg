<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- Outer bounding frame -->
  <rect x="10" y="10" width="380" height="280" stroke="#E0E0E0" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Node 1: Source (left) - outer rect -->
  <rect x="20" y="115" width="70" height="70" stroke="#FFFFFF" stroke-width="2"/>
  <!-- Node 1: coin stack detail -->
  <ellipse cx="55" cy="130" rx="18" ry="6" stroke="#FFFFFF" stroke-width="1.5"/>
  <line x1="37" y1="130" x2="37" y2="155" stroke="#FFFFFF" stroke-width="1.5"/>
  <line x1="73" y1="130" x2="73" y2="155" stroke="#FFFFFF" stroke-width="1.5"/>
  <ellipse cx="55" cy="155" rx="18" ry="6" stroke="#FFFFFF" stroke-width="1.5"/>
  <ellipse cx="55" cy="148" rx="18" ry="6" stroke="#FFFFFF" stroke-width="1"/>
  <ellipse cx="55" cy="141" rx="18" ry="6" stroke="#FFFFFF" stroke-width="1"/>

  <!-- Flow arrow 1: Node1 to Node2 -->
  <line x1="90" y1="150" x2="140" y2="150" stroke="#FFFFFF" stroke-width="2"/>
  <polyline points="133,143 140,150 133,157" stroke="#FFFFFF" stroke-width="2"/>
  <!-- Dollar sign on flow line -->
  <line x1="115" y1="143" x2="115" y2="157" stroke="#E0E0E0" stroke-width="1"/>
  <path d="M110,147 Q110,143 115,143 Q120,143 120,147 Q120,151 115,151 Q120,151 120,155 Q120,159 115,159 Q110,159 110,155" stroke="#E0E0E0" stroke-width="1"/>

  <!-- Node 2: Central hub - outer circle -->
  <circle cx="185" cy="150" r="40" stroke="#FFFFFF" stroke-width="2"/>
  <!-- Inner circle -->
  <circle cx="185" cy="150" r="28" stroke="#E0E0E0" stroke-width="1"/>
  <!-- Hub center cross detail -->
  <line x1="185" y1="125" x2="185" y2="175" stroke="#E0E0E0" stroke-width="1"/>
  <line x1="160" y1="150" x2="210" y2="150" stroke="#E0E0E0" stroke-width="1"/>
  <circle cx="185" cy="150" r="8" stroke="#FFFFFF" stroke-width="1.5"/>
  <!-- Rotation arrows on hub -->
  <path d="M185,122 A28,28 0 0,1 210,145" stroke="#E0E0E0" stroke-width="1" stroke-dasharray="3,3"/>
  <polyline points="207,138 210,145 203,143" stroke="#E0E0E0" stroke-width="1"/>

  <!-- Flow arrow 2: Node2 to Node3 (top) -->
  <line x1="185" y1="110" x2="185" y2="60" stroke="#FFFFFF" stroke-width="2"/>
  <polyline points="178,67 185,60 192,67" stroke="#FFFFFF" stroke-width="2"/>

  <!-- Node 3: Top output -->
  <rect x="145" y="20" width="80" height="40" stroke="#FFFFFF" stroke-width="2"/>
  <!-- Revenue bar chart inside -->
  <rect x="158" y="35" width="10" height="18" stroke="#E0E0E0" stroke-width="1"/>
  <rect x="173" y="29" width="10" height="24" stroke="#E0E0E0" stroke-width="1"/>
  <rect x="188" y="32" width="10" height="21" stroke="#E0E0E0" stroke-width="1"/>
  <rect x="203" y="26" width="10" height="27" stroke="#E0E0E0" stroke-width="1"/>

  <!-- Flow arrow 3: Node2 to Node4 (right) -->
  <line x1="225" y1="150" x2="290" y2="150" stroke="#FFFFFF" stroke-width="2"/>
  <polyline points="283,143 290,150 283,157" stroke="#FFFFFF" stroke-width="2"/>
  <!-- Flow label dashes -->
  <line x1="250" y1="143" x2="265" y2="143" stroke="#E0E0E0" stroke-width="1"/>
  <line x1="250" y1="157" x2="265" y2="157" stroke="#E0E0E0" stroke-width="1"/>

  <!-- Node 4: Right output -->
  <rect x="290" y="115" width="80" height="70" stroke="#FFFFFF" stroke-width="2"/>
  <!-- Expense detail: stacked lines -->
  <line x1="303" y1="135" x2="357" y2="135" stroke="#E0E0E0" stroke-width="1"/>
  <line x1="303" y1="145" x2="345" y2="145" stroke="#E0E0E0" stroke-width="1"/>
  <line x1="303" y1="155" x2="350" y2="155" stroke="#E0E0E0" stroke-width="1"/>
  <line x1="303" y1="165" x2="338" y2="165" stroke="#E0E0E0" stroke-width="1"/>
  <!-- Arrow down detail on right node -->
  <line x1="330" y1="127" x2="330" y2="170" stroke="#E0E0E0" stroke-width="1" stroke-dasharray="2,2"/>

  <!-- Flow arrow 4: Node2 to Node5 (bottom) -->
  <line x1="185" y1="190" x2="185" y2="240" stroke="#FFFFFF" stroke-width="2"/>
  <polyline points="178,233 185,240 192,233" stroke="#FFFFFF" stroke-width="2"/>

  <!-- Node 5: Bottom output -->
  <rect x="145" y="240" width="80" height="45" stroke="#FFFFFF" stroke-width="2"/>
  <!-- Investment grid detail -->
  <line x1="165" y1="252" x2="165" y2="278" stroke="#E0E0E0" stroke-width="1"/>
  <line x1="185" y1="252" x2="185" y2="278" stroke="#E0E0E0" stroke-width="1"/>
  <line x1="205" y1="252" x2="205" y2="278" stroke="#E0E0E0" stroke-width="1"/>
  <line x1="153" y1="263" x2="217" y2="263" stroke="#E0E0E0" stroke-width="1"/>
  <!-- Upward trend line on bottom node -->
  <polyline points="153,278 165,271 180,266 200,258 217,252" stroke="#FFFFFF" stroke-width="1.5"/>

  <!-- Feedback loop: Node4 back down and around to Node5 -->
  <path d="M370,185 Q385,215 370,250 Q355,275 330,275 Q260,275 225,275 Q210,275 210,260" stroke="#E0E0E0" stroke-width="1" stroke-dasharray="5,3"/>
  <polyline points="203,263 210,260 217,263" stroke="#E0E0E0" stroke-width="1"/>

  <!-- Feedback loop: Node3 to Node1 top arc -->
  <path d="M148,30 Q85,15 50,115" stroke="#E0E0E0" stroke-width="1" stroke-dasharray="5,3"/>
  <polyline points="44,108 50,115 57,110" stroke="#E0E0E0" stroke-width="1"/>

  <!-- Corner tick marks for frame -->
  <line x1="10" y1="20" x2="20" y2="20" stroke="#E0E0E0" stroke-width="1"/>
  <line x1="20" y1="10" x2="20" y2="20" stroke="#E0E0E0" stroke-width="1"/>
  <line x1="380" y1="20" x2="390" y2="20" stroke="#E0E0E0" stroke-width="1"/>
  <line x1="380" y1="10" x2="380" y2="20" stroke="#E0E0E0" stroke-width="1"/>
  <line x1="10" y1="280" x2="20" y2="280" stroke="#E0E0E0" stroke-width="1"/>
  <line x1="20" y1="280" x2="20" y2="290" stroke="#E0E0E0" stroke-width="1"/>
  <line x1="380" y1="280" x2="390" y2="280" stroke="#E0E0E0" stroke-width="1"/>
  <line x1="380" y1="280" x2="380" y2="290" stroke="#E0E0E0" stroke-width="1"/>
</svg>