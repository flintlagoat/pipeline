<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="#FFFFFF" stroke-linecap="round" stroke-linejoin="round">

  <!-- Outer silhouette: main body of cash register -->
  <path d="M60 260 L60 140 Q60 130 70 130 L280 130 Q290 130 290 140 L290 260 Z" stroke="#FFFFFF" stroke-width="2"/>

  <!-- Drawer base extension -->
  <path d="M50 240 L50 260 L310 260 L310 240" stroke="#FFFFFF" stroke-width="2"/>

  <!-- Upper display/terminal section -->
  <path d="M120 130 L120 80 Q120 70 130 70 L270 70 Q280 70 280 80 L280 130" stroke="#FFFFFF" stroke-width="2"/>

  <!-- Display screen -->
  <rect x="135" y="78" width="130" height="40" rx="3" stroke="#FFFFFF" stroke-width="1.5"/>

  <!-- Screen inner detail lines -->
  <line x1="145" y1="90" x2="255" y2="90" stroke="#E0E0E0" stroke-width="1"/>
  <line x1="145" y1="100" x2="255" y2="100" stroke="#E0E0E0" stroke-width="1"/>
  <line x1="145" y1="110" x2="220" y2="110" stroke="#E0E0E0" stroke-width="1"/>

  <!-- Keypad area on main body -->
  <!-- Row 1 keys -->
  <rect x="80" y="148" width="18" height="14" rx="2" stroke="#E0E0E0" stroke-width="1"/>
  <rect x="104" y="148" width="18" height="14" rx="2" stroke="#E0E0E0" stroke-width="1"/>
  <rect x="128" y="148" width="18" height="14" rx="2" stroke="#E0E0E0" stroke-width="1"/>
  <rect x="152" y="148" width="18" height="14" rx="2" stroke="#E0E0E0" stroke-width="1"/>
  <rect x="176" y="148" width="18" height="14" rx="2" stroke="#E0E0E0" stroke-width="1"/>

  <!-- Row 2 keys -->
  <rect x="80" y="168" width="18" height="14" rx="2" stroke="#E0E0E0" stroke-width="1"/>
  <rect x="104" y="168" width="18" height="14" rx="2" stroke="#E0E0E0" stroke-width="1"/>
  <rect x="128" y="168" width="18" height="14" rx="2" stroke="#E0E0E0" stroke-width="1"/>
  <rect x="152" y="168" width="18" height="14" rx="2" stroke="#E0E0E0" stroke-width="1"/>
  <rect x="176" y="168" width="18" height="14" rx="2" stroke="#E0E0E0" stroke-width="1"/>

  <!-- Row 3 keys -->
  <rect x="80" y="188" width="18" height="14" rx="2" stroke="#E0E0E0" stroke-width="1"/>
  <rect x="104" y="188" width="18" height="14" rx="2" stroke="#E0E0E0" stroke-width="1"/>
  <rect x="128" y="188" width="18" height="14" rx="2" stroke="#E0E0E0" stroke-width="1"/>
  <rect x="152" y="188" width="18" height="14" rx="2" stroke="#E0E0E0" stroke-width="1"/>
  <rect x="176" y="188" width="18" height="14" rx="2" stroke="#E0E0E0" stroke-width="1"/>

  <!-- Large enter/total key on right side of keypad -->
  <rect x="210" y="148" width="28" height="34" rx="2" stroke="#FFFFFF" stroke-width="1.5"/>

  <!-- Function keys right column -->
  <rect x="210" y="188" width="28" height="14" rx="2" stroke="#E0E0E0" stroke-width="1"/>

  <!-- Drawer horizontal line -->
  <line x1="60" y1="240" x2="290" y2="240" stroke="#FFFFFF" stroke-width="1.5"/>

  <!-- Drawer handle -->
  <path d="M155 248 Q175 244 195 248" stroke="#FFFFFF" stroke-width="1.5"/>

  <!-- Drawer divider lines -->
  <line x1="85" y1="240" x2="85" y2="260" stroke="#E0E0E0" stroke-width="1"/>
  <line x1="125" y1="240" x2="125" y2="260" stroke="#E0E0E0" stroke-width="1"/>
  <line x1="165" y1="240" x2="165" y2="260" stroke="#E0E0E0" stroke-width="1"/>
  <line x1="210" y1="240" x2="210" y2="260" stroke="#E0E0E0" stroke-width="1"/>
  <line x1="255" y1="240" x2="255" y2="260" stroke="#E0E0E0" stroke-width="1"/>

  <!-- Receipt paper slot at top of terminal -->
  <rect x="230" y="62" width="36" height="10" rx="2" stroke="#E0E0E0" stroke-width="1"/>

  <!-- Receipt paper strip -->
  <line x1="248" y1="62" x2="248" y2="45" stroke="#E0E0E0" stroke-width="1"/>
  <line x1="243" y1="45" x2="253" y2="45" stroke="#E0E0E0" stroke-width="1"/>
  <line x1="241" y1="50" x2="255" y2="50" stroke="#E0E0E0" stroke-width="1"/>
  <line x1="241" y1="55" x2="255" y2="55" stroke="#E0E0E0" stroke-width="1"/>

  <!-- Side panel detail lines on body -->
  <line x1="60" y1="160" x2="75" y2="160" stroke="#E0E0E0" stroke-width="1"/>
  <line x1="60" y1="175" x2="75" y2="175" stroke="#E0E0E0" stroke-width="1"/>
  <line x1="60" y1="190" x2="75" y2="190" stroke="#E0E0E0" stroke-width="1"/>

  <!-- Base feet -->
  <rect x="70" y="258" width="20" height="8" rx="2" stroke="#E0E0E0" stroke-width="1"/>
  <rect x="260" y="258" width="20" height="8" rx="2" stroke="#E0E0E0" stroke-width="1"/>

</svg>