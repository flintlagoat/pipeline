<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg" fill="none">

  <!-- Outer bounding silhouette: full chain flow left to right -->
  <rect x="10" y="80" width="380" height="140" rx="4" stroke="#FFFFFF" stroke-width="1.5" opacity="0.12"/>

  <!-- Node 1: Raw Materials (leftmost) -->
  <rect x="20" y="110" width="60" height="80" rx="3" stroke="#FFFFFF" stroke-width="2"/>
  <!-- interior detail: stacked lines suggesting raw material blocks -->
  <line x1="30" y1="125" x2="70" y2="125" stroke="#E0E0E0" stroke-width="1"/>
  <line x1="30" y1="138" x2="70" y2="138" stroke="#E0E0E0" stroke-width="1"/>
  <line x1="30" y1="151" x2="70" y2="151" stroke="#E0E0E0" stroke-width="1"/>
  <line x1="30" y1="164" x2="70" y2="164" stroke="#E0E0E0" stroke-width="1"/>
  <line x1="30" y1="177" x2="70" y2="177" stroke="#E0E0E0" stroke-width="1"/>

  <!-- Arrow 1 -->
  <line x1="80" y1="150" x2="108" y2="150" stroke="#FFFFFF" stroke-width="1.5"/>
  <polyline points="104,144 110,150 104,156" stroke="#FFFFFF" stroke-width="1.5"/>

  <!-- Node 2: Supplier -->
  <rect x="110" y="110" width="60" height="80" rx="3" stroke="#FFFFFF" stroke-width="2"/>
  <!-- interior: small box-in-box suggesting supply warehouse -->
  <rect x="122" y="122" width="36" height="28" rx="1" stroke="#E0E0E0" stroke-width="1"/>
  <line x1="122" y1="158" x2="158" y2="158" stroke="#E0E0E0" stroke-width="1"/>
  <line x1="122" y1="167" x2="150" y2="167" stroke="#E0E0E0" stroke-width="1"/>
  <line x1="130" y1="122" x2="130" y2="150" stroke="#E0E0E0" stroke-width="1"/>

  <!-- Arrow 2 -->
  <line x1="170" y1="150" x2="198" y2="150" stroke="#FFFFFF" stroke-width="1.5"/>
  <polyline points="194,144 200,150 194,156" stroke="#FFFFFF" stroke-width="1.5"/>

  <!-- Node 3: Manufacturing (center) -->
  <rect x="200" y="100" width="70" height="100" rx="3" stroke="#FFFFFF" stroke-width="2"/>
  <!-- interior: gear-like cross detail -->
  <rect x="212" y="115" width="46" height="32" rx="1" stroke="#E0E0E0" stroke-width="1"/>
  <line x1="235" y1="115" x2="235" y2="147" stroke="#E0E0E0" stroke-width="1"/>
  <line x1="212" y1="131" x2="258" y2="131" stroke="#E0E0E0" stroke-width="1"/>
  <!-- conveyor line detail -->
  <line x1="212" y1="160" x2="258" y2="160" stroke="#E0E0E0" stroke-width="1"/>
  <circle cx="218" cy="160" r="4" stroke="#E0E0E0" stroke-width="1"/>
  <circle cx="252" cy="160" r="4" stroke="#E0E0E0" stroke-width="1"/>
  <line x1="212" y1="175" x2="258" y2="175" stroke="#E0E0E0" stroke-width="1"/>
  <line x1="212" y1="185" x2="248" y2="185" stroke="#E0E0E0" stroke-width="1"/>

  <!-- Arrow 3 -->
  <line x1="270" y1="150" x2="298" y2="150" stroke="#FFFFFF" stroke-width="1.5"/>
  <polyline points="294,144 300,150 294,156" stroke="#FFFFFF" stroke-width="1.5"/>

  <!-- Node 4: Distribution -->
  <rect x="300" y="110" width="60" height="80" rx="3" stroke="#FFFFFF" stroke-width="2"/>
  <!-- interior: truck/box shelf detail -->
  <rect x="310" y="122" width="40" height="22" rx="1" stroke="#E0E0E0" stroke-width="1"/>
  <line x1="310" y1="155" x2="350" y2="155" stroke="#E0E0E0" stroke-width="1"/>
  <circle cx="318" cy="168" r="5" stroke="#E0E0E0" stroke-width="1"/>
  <circle cx="342" cy="168" r="5" stroke="#E0E0E0" stroke-width="1"/>
  <line x1="323" y1="168" x2="337" y2="168" stroke="#E0E0E0" stroke-width="1"/>
  <line x1="310" y1="178" x2="350" y2="178" stroke="#E0E0E0" stroke-width="1"/>

  <!-- Flow label dashes across bottom connecting all nodes -->
  <line x1="50" y1="230" x2="330" y2="230" stroke="#E0E0E0" stroke-width="1" stroke-dasharray="6,4"/>
  <!-- small tick marks at each node center -->
  <line x1="50" y1="225" x2="50" y2="235" stroke="#E0E0E0" stroke-width="1"/>
  <line x1="140" y1="225" x2="140" y2="235" stroke="#E0E0E0" stroke-width="1"/>
  <line x1="235" y1="225" x2="235" y2="235" stroke="#E0E0E0" stroke-width="1"/>
  <line x1="330" y1="225" x2="330" y2="235" stroke="#E0E0E0" stroke-width="1"/>

  <!-- Vertical connectors from nodes to baseline -->
  <line x1="50" y1="190" x2="50" y2="230" stroke="#E0E0E0" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="140" y1="190" x2="140" y2="230" stroke="#E0E0E0" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="235" y1="200" x2="235" y2="230" stroke="#E0E0E0" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="330" y1="190" x2="330" y2="230" stroke="#E0E0E0" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Small node circles at baseline ticks -->
  <circle cx="50" cy="230" r="3" stroke="#FFFFFF" stroke-width="1.5"/>
  <circle cx="140" cy="230" r="3" stroke="#FFFFFF" stroke-width="1.5"/>
  <circle cx="235" cy="230" r="3" stroke="#FFFFFF" stroke-width="1.5"/>
  <circle cx="330" cy="230" r="3" stroke="#FFFFFF" stroke-width="1.5"/>

</svg>