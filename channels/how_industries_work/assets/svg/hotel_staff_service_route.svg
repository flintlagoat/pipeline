<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Hotel building outline -->
  <rect x="20" y="40" width="160" height="230" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  <!-- Roof line -->
  <polyline points="20,40 100,15 180,40" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  <!-- Floor divisions -->
  <line x1="20" y1="100" x2="180" y2="100" fill="none" stroke="#FFFFFF" stroke-width="1"/>
  <line x1="20" y1="160" x2="180" y2="160" fill="none" stroke="#FFFFFF" stroke-width="1"/>
  <line x1="20" y1="220" x2="180" y2="220" fill="none" stroke="#FFFFFF" stroke-width="1"/>
  <!-- Room doors floor 1 -->
  <rect x="35" y="58" width="24" height="34" fill="none" stroke="#FFFFFF" stroke-width="1"/>
  <rect x="75" y="58" width="24" height="34" fill="none" stroke="#FFFFFF" stroke-width="1"/>
  <rect x="115" y="58" width="24" height="34" fill="none" stroke="#FFFFFF" stroke-width="1"/>
  <rect x="148" y="58" width="24" height="34" fill="none" stroke="#FFFFFF" stroke-width="1"/>
  <!-- Room doors floor 2 -->
  <rect x="35" y="118" width="24" height="34" fill="none" stroke="#FFFFFF" stroke-width="1"/>
  <rect x="75" y="118" width="24" height="34" fill="none" stroke="#FFFFFF" stroke-width="1"/>
  <rect x="115" y="118" width="24" height="34" fill="none" stroke="#FFFFFF" stroke-width="1"/>
  <rect x="148" y="118" width="24" height="34" fill="none" stroke="#FFFFFF" stroke-width="1"/>
  <!-- Lobby door floor 3 -->
  <rect x="35" y="232" width="40" height="38" fill="none" stroke="#FFFFFF" stroke-width="1"/>
  <line x1="55" y1="232" x2="55" y2="270" fill="none" stroke="#FFFFFF" stroke-width="1"/>

  <!-- Service trolley / cart icon (staff) -->
  <g stroke="#FFFFFF" fill="none">
    <rect x="220" y="180" width="60" height="44" stroke-width="2"/>
    <line x1="220" y1="200" x2="280" y2="200" stroke-width="1"/>
    <line x1="280" y1="180" x2="298" y2="166" stroke-width="2"/>
    <circle cx="232" cy="236" r="9" stroke-width="2"/>
    <circle cx="268" cy="236" r="9" stroke-width="2"/>
    <!-- towels stacked on top -->
    <rect x="226" y="170" width="20" height="10" stroke-width="1"/>
    <rect x="252" y="172" width="20" height="8" stroke-width="1"/>
  </g>

  <!-- Destination flag / front desk -->
  <g stroke="#FFFFFF" fill="none">
    <rect x="320" y="60" width="60" height="40" stroke-width="2"/>
    <line x1="320" y1="80" x2="380" y2="80" stroke-width="1"/>
    <line x1="350" y1="60" x2="350" y2="100" stroke-width="1"/>
    <!-- bell -->
    <path d="M338 50 a8 8 0 0 1 16 0" stroke-width="1.5"/>
    <line x1="346" y1="42" x2="346" y2="50" stroke-width="1.5"/>
    <line x1="334" y1="50" x2="358" y2="50" stroke-width="1.5"/>
  </g>

  <!-- Dashed service route path -->
  <path d="M75 250 Q 200 250 250 224 Q 300 200 300 150 Q 300 110 350 100"
        fill="none" stroke="#FFFFFF" stroke-width="2" stroke-dasharray="7 6"/>

  <!-- Route waypoint markers -->
  <circle cx="75" cy="250" r="5" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
  <circle cx="250" cy="224" r="4" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
  <circle cx="300" cy="150" r="4" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>

  <!-- Direction arrowhead -->
  <polyline points="338,108 350,100 348,114" fill="none" stroke="#FFFFFF" stroke-width="2"/>
</svg>