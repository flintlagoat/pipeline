<svg viewBox="0 0 300 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Bin body silhouette -->
  <path d="M70 130 L80 360 L220 360 L230 130 Z" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  <!-- Lid -->
  <rect x="58" y="108" width="184" height="24" rx="4" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  <!-- Lid handle -->
  <path d="M130 108 L132 92 L168 92 L170 108" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  <!-- Body vertical ribs -->
  <line x1="105" y1="135" x2="111" y2="355" stroke="#FFFFFF" stroke-width="1"/>
  <line x1="150" y1="135" x2="150" y2="355" stroke="#FFFFFF" stroke-width="1"/>
  <line x1="195" y1="135" x2="189" y2="355" stroke="#FFFFFF" stroke-width="1"/>
  <!-- Spoiled food contents above rim -->
  <path d="M90 130 q15 -22 35 -10 q12 -18 30 -6 q14 -20 32 -4 q12 -10 25 0" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
  <!-- banana peel -->
  <path d="M110 122 q-6 -18 6 -26 q4 10 -2 18" fill="none" stroke="#FFFFFF" stroke-width="1.2"/>
  <path d="M110 122 q-12 -10 -8 -24" fill="none" stroke="#FFFFFF" stroke-width="1.2"/>
  <!-- apple core -->
  <circle cx="160" cy="108" r="9" fill="none" stroke="#FFFFFF" stroke-width="1.2"/>
  <line x1="160" y1="99" x2="160" y2="92" stroke="#FFFFFF" stroke-width="1.2"/>
  <!-- fish bone -->
  <path d="M188 116 l24 -4" fill="none" stroke="#FFFFFF" stroke-width="1.2"/>
  <line x1="196" y1="112" x2="196" y2="118" stroke="#FFFFFF" stroke-width="1"/>
  <line x1="202" y1="111" x2="202" y2="117" stroke="#FFFFFF" stroke-width="1"/>
  <line x1="208" y1="110" x2="208" y2="116" stroke="#FFFFFF" stroke-width="1"/>
  <circle cx="190" cy="116" r="3" fill="none" stroke="#FFFFFF" stroke-width="1"/>
  <!-- stink lines -->
  <path d="M120 80 q4 -8 0 -16 q-4 -8 0 -16" fill="none" stroke="#FFFFFF" stroke-width="1"/>
  <path d="M180 78 q4 -8 0 -16 q-4 -8 0 -16" fill="none" stroke="#FFFFFF" stroke-width="1"/>
  <!-- flies -->
  <circle cx="100" cy="60" r="2" fill="none" stroke="#FFFFFF" stroke-width="1"/>
  <line x1="96" y1="58" x2="104" y2="62" stroke="#FFFFFF" stroke-width="0.8"/>
  <circle cx="210" cy="70" r="2" fill="none" stroke="#FFFFFF" stroke-width="1"/>
  <line x1="206" y1="68" x2="214" y2="72" stroke="#FFFFFF" stroke-width="0.8"/>
</svg>